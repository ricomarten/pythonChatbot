<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Bot Rule Simple</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">Bot Rule</div>
        
        <div id="box" class="card-body overflow-auto" style="height: 300px;">
            <p class="text-secondary"><i>Bot: Halo! Silakan bertanya.</i></p>
        </div>

        <div class="card-footer">
            <div class="input-group">
                <input type="text" id="in" class="form-control" placeholder="Ketik..." onkeypress="if(event.key=='Enter')send()">
                <button class="btn btn-dark" onclick="send()">Kirim</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function send() {
        let input = document.getElementById('in');
        let box = document.getElementById('box');
        if(!input.value.trim()) return;

        // User Chat
        box.innerHTML += `<p class="text-end"><b>Anda:</b> ${input.value}</p>`;
        
        let res = await fetch('/get_response', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: input.value})
        });
        let data = await res.json();

        // Bot Chat
        box.innerHTML += `<p class="text-success"><b>Bot:</b> ${data.reply}</p>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
