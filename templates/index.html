<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chatbot - GVR System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chat-bubble { max-width: 85%; word-wrap: break-word; }
        pre { background: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 10px 0; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <aside class="w-72 bg-gray-900 text-white flex flex-col p-6 shadow-xl hidden md:flex">
        <div class="mb-10">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-microchip text-blue-400"></i> Local AI
            </h1>
            <p class="text-[10px] text-gray-400 mt-1 tracking-widest uppercase">Secure Offline Environment</p>
        </div>
        
        <nav class="flex-1 space-y-8">
            <div>
                <label class="text-xs text-gray-500 uppercase font-bold tracking-wider">Configuration</label>
                <div class="mt-3">
                    <p class="text-xs text-gray-400 mb-2">Select Model:</p>
                    <select id="model-select" class="w-full p-2.5 bg-gray-800 border border-gray-700 rounded-lg text-sm text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <option value="deepseek-r1:1.5b">DeepSeek R1 (1.5B)</option>
                        <option value="deepseek-r1:7b" selected>DeepSeek R1 (7B)</option>
                        <option value="llama3.2:3b">Llama 3.2 (3B)</option>
                        <option value="mistral">Mistral</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <button onclick="clearChat()" class="w-full text-left p-3 text-sm text-gray-400 hover:bg-red-900/20 hover:text-red-400 rounded-lg transition-all flex items-center gap-3">
                    <i class="fas fa-trash-alt"></i> Clear Conversation
                </button>
            </div>
        </nav>

        <div class="mt-auto pt-6 border-t border-gray-800">
            <div class="flex items-center gap-3 text-xs text-gray-500">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                Ollama Engine Active
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-white relative">
        <header class="h-16 border-b flex items-center justify-between px-8 bg-white/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <span id="current-model-display" class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold uppercase tracking-tighter">
                    DeepSeek R1 (7B)
                </span>
            </div>
            <div class="text-gray-400 text-sm italic">Local Audit Mode</div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-6">
            <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mb-4 shadow-sm">
                    <i class="fas fa-comment-dots"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800">Halo, Mas Rico!</h3>
                <p class="text-gray-500 text-sm max-w-xs mt-2">Silakan pilih model di sidebar dan mulai diskusi aman secara lokal.</p>
            </div>
        </div>

        <div class="p-8">
            <div class="max-w-4xl mx-auto">
                <div class="relative flex items-end gap-2 bg-gray-50 border border-gray-200 rounded-2xl p-2 shadow-sm focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
                    <textarea id="user-input" 
                        rows="1" 
                        class="flex-1 p-3 bg-transparent outline-none resize-none text-sm max-h-40" 
                        placeholder="Ketik pesan di sini..."
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    
                    <button onclick="sendMessage()" 
                        class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 transition shadow-md">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="text-[10px] text-center text-gray-400 mt-3 font-medium">
                    <i class="fas fa-lock mr-1"></i> Data Anda tidak akan keluar dari Mac ini.
                </p>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const modelSelect = document.getElementById('model-select');
        const currentModelDisplay = document.getElementById('current-model-display');

        // Update display model saat select berubah
        modelSelect.addEventListener('change', () => {
            currentModelDisplay.innerText = modelSelect.options[modelSelect.selectedIndex].text;
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            const selectedModel = modelSelect.value;
            
            if (!message) return;

            // Sembunyikan welcome screen jika ada
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();

            // Render pesan user
            appendMessage(message, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';

            // Loading state
            const loadingId = 'loading-' + Date.now();
            const loadingHtml = `
                <div id="${loadingId}" class="flex gap-4 animate-pulse">
                    <div class="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center text-gray-400">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="bg-gray-100 p-4 rounded-2xl text-gray-400 text-sm italic">Berpikir...</div>
                </div>
            `;
            chatBox.innerHTML += loadingHtml;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, model: selectedModel })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                appendMessage(data.reply, 'bot');
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage("Error: Gagal terhubung ke Ollama. Pastikan aplikasi Ollama aktif.", 'bot');
            }
        }

        function appendMessage(text, sender) {
            const isBot = sender === 'bot';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-4 ${isBot ? '' : 'flex-row-reverse'} fade-in`;
            
            msgDiv.innerHTML = `
                <div class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center shadow-sm 
                    ${isBot ? 'bg-blue-600 text-white' : 'bg-gray-800 text-white'}">
                    <i class="fas ${isBot ? 'fa-robot' : 'fa-user'} text-xs"></i>
                </div>
                <div class="chat-bubble p-4 rounded-2xl text-sm leading-relaxed shadow-sm
                    ${isBot ? 'bg-gray-100 text-gray-800 rounded-tl-none' : 'bg-blue-600 text-white rounded-tr-none'}">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearChat() {
            if(confirm("Hapus semua chat?")) location.reload();
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>

    <style>
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
