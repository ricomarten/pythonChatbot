<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pakar AK Kemnaker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --indigo: #4f46e5; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 15px; height: 85vh; overflow: hidden; }
        .card-header { background: var(--indigo); color: white; font-weight: 600; padding: 15px 20px; }
        
        #chat-box { height: calc(100% - 70px); overflow-y: auto; padding: 25px; display: flex; flex-direction: column; background: white; }
        
        .msg { max-width: 85%; margin-bottom: 20px; padding: 15px; border-radius: 12px; font-size: 0.95rem; line-height: 1.6; }
        .bot-msg { background: #f1f5f9; align-self: flex-start; border-bottom-left-radius: 2px; color: #1e293b; }
        .user-msg { background: var(--indigo); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Styling Tabel Hasil AI */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; background: white; border-radius: 8px; overflow: hidden; }
        table th, table td { border: 1px solid #e2e8f0; padding: 10px 12px; text-align: left; }
        table th { background: #f8fafc; color: var(--indigo); font-weight: bold; }

        .input-area { background: white; padding: 15px; border-top: 1px solid #e2e8f0; }
        .form-control:focus { box-shadow: none; border-color: var(--indigo); }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg">
                <div class="card-header">Ollama AI: Konsultan Angka Kredit</div>
                <div id="chat-box">
                    <div class="msg bot-msg">Halo Mas Rico! Saya siap membantu konsultasi Angka Kredit sesuai Peraturan BKN 3/2023. Apa yang ingin Anda tanyakan?</div>
                </div>
                <div class="input-area">
                    <div class="input-group">
                        <input type="text" id="user-input" class="form-control" placeholder="Tulis pertanyaan..." onkeypress="if(event.key==='Enter') sendChat()">
                        <button class="btn btn-primary px-4" onclick="sendChat()">Kirim</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function sendChat() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        const res = await fetch('/get_response', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        
        const data = await res.json();
        chatBox.innerHTML += `<div class="msg bot-msg"><div>${data.reply}</div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
